<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin — Jhonny Styles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/pages/admin.css">
</head>
<body class="adm-body">

  <aside class="adm-sidebar" id="adm-sidebar">

    <!-- Usuário logado -->
    <div class="adm-sidebar__user" id="adm-user-profile-btn" title="Meu Perfil">
      <div class="adm-sidebar__user-avatar">SL</div>
      <div class="adm-sidebar__user-info">
        <p class="adm-sidebar__user-name">Shelly Lopes</p>
        <p class="adm-sidebar__user-role">Administradora</p>
      </div>
      <svg class="adm-sidebar__user-edit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </div>

    <!-- Busca -->
    <div class="adm-sidebar__search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="adm-search" placeholder="Buscar..." autocomplete="off">
    </div>

    <!-- Nav -->
    <nav class="adm-nav" id="adm-nav">

      <div class="adm-nav__group" data-group="principal">
        <span class="adm-nav__label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          Principal
        </span>
        <a class="adm-nav__item is-active" data-section="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </a>
        <a class="adm-nav__item" data-section="vendas">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Vendas
        </a>
        <a class="adm-nav__item" data-section="financeiro">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          Financeiro
        </a>
      </div>

      <div class="adm-nav__group" data-group="operacoes">
        <span class="adm-nav__label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
          Operações
        </span>
        <a class="adm-nav__item" data-section="estoque">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          Estoque
        </a>
        <a class="adm-nav__item" data-section="pedidos">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          Pedidos
        </a>
        <a class="adm-nav__item" data-section="pagamentos">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
          Pagamentos
        </a>
      </div>

      <div class="adm-nav__group" data-group="gestao">
        <span class="adm-nav__label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Gestão
        </span>
        <a class="adm-nav__item" data-section="fornecedores">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
          Fornecedores
        </a>
        <a class="adm-nav__item" data-section="colaboradores">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Colaboradores
        </a>
        <a class="adm-nav__item" data-section="clientes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Clientes
        </a>
      </div>

    </nav>

    <div class="adm-sidebar__footer">
      <a href="index.html" class="adm-sidebar__back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        Voltar ao Site
      </a>
      <div class="adm-sidebar__brand">
        <img src="assets/images/logotipo/ICONE CIRCULAR.png" alt="Jhonny Styles" class="adm-sidebar__logo">
        <div>
          <span class="adm-sidebar__brand-name">Jhonny Styles</span>
          <span class="adm-sidebar__brand-sub">Painel Admin</span>
        </div>
      </div>
    </div>
  </aside>

  <div class="adm-layout">
    <header class="adm-topbar">
      <div class="adm-topbar__left">
        <button class="adm-sidebar-toggle" id="adm-toggle" aria-label="Menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="adm-topbar__title" id="adm-page-title">Dashboard</h1>
      </div>
      <div class="adm-topbar__right">
        <div class="adm-period-pills" id="adm-period-pills">
          <button class="adm-period-pill is-active" data-period="semana">Semana</button>
          <button class="adm-period-pill" data-period="mes">Mês</button>
          <button class="adm-period-pill" data-period="ano">Ano</button>
        </div>

        <!-- Calendar month picker -->
        <div class="adm-cal" id="adm-cal">
          <button class="adm-cal__arrow" id="adm-cal-prev" title="Mês anterior">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <button class="adm-cal__label" id="adm-cal-label">
            <span id="adm-cal-text">Junho de 2026</span>
            <svg class="adm-cal__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          </button>
          <button class="adm-cal__arrow" id="adm-cal-next" title="Próximo mês">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
          <div class="adm-cal__dropdown" id="adm-cal-dropdown">
            <div class="adm-cal__yr-nav">
              <button class="adm-cal__yr-btn" id="adm-cal-yr-prev">‹</button>
              <span class="adm-cal__yr-val" id="adm-cal-year">2026</span>
              <button class="adm-cal__yr-btn" id="adm-cal-yr-next">›</button>
            </div>
            <div class="adm-cal__month-grid" id="adm-cal-months"></div>
            <div class="adm-cal__footer">
              <button class="adm-cal__today-btn" id="adm-cal-today">Este mês</button>
            </div>
          </div>
        </div>

        <div class="adm-topbar__notif" title="Notificações">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="adm-topbar__notif-dot"></span>
        </div>
      </div>
    </header>

    <main class="adm-content adm-anim" id="adm-content"></main>
  </div>

  <div class="adm-overlay" id="adm-overlay"></div>

  <!-- Quick Actions FAB -->
  <div class="adm-fab-wrap" id="adm-fab-wrap">
    <div class="adm-fab__menu" id="adm-fab-menu">
      <button class="adm-fab__action" data-action="venda">
        <svg class="adm-fab__action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span class="adm-fab__action-label">Nova Venda</span>
      </button>
      <button class="adm-fab__action" data-action="pedido">
        <svg class="adm-fab__action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <span class="adm-fab__action-label">Novo Pedido</span>
      </button>
      <button class="adm-fab__action" data-action="entrada">
        <svg class="adm-fab__action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        <span class="adm-fab__action-label">Registrar Entrada</span>
      </button>
      <button class="adm-fab__action" data-action="saida">
        <svg class="adm-fab__action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>
        <span class="adm-fab__action-label">Registrar Saída</span>
      </button>
      <button class="adm-fab__action" data-action="pagamento">
        <svg class="adm-fab__action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
        <span class="adm-fab__action-label">Registrar Pagamento</span>
      </button>
      <button class="adm-fab__action" data-action="cliente">
        <svg class="adm-fab__action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span class="adm-fab__action-label">Novo Cliente</span>
      </button>
    </div>
    <button class="adm-fab__btn" id="adm-fab-btn" title="Ações Rápidas">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>

  <!-- Modal -->
  <div class="adm-modal" id="adm-modal">
    <div class="adm-modal__backdrop" id="adm-modal-backdrop"></div>
    <div class="adm-modal__box">
      <div class="adm-modal__header">
        <h3 class="adm-modal__title" id="adm-modal-title">Ação Rápida</h3>
        <button class="adm-modal__close" id="adm-modal-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="adm-modal__body" id="adm-modal-body"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="adm-toast" id="adm-toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="js/data/mock.js"></script>
  <script src="js/pages/admin.js"></script>
</body>
</html>
